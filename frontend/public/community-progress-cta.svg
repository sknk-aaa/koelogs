<!-- community-progress-cta.svg -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 160" width="800" height="160">
  <defs>
    <!-- Soft background -->
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F3F8FF"/>
      <stop offset="55%" stop-color="#EEF6FF"/>
      <stop offset="100%" stop-color="#F7FAFF"/>
    </linearGradient>

    <!-- Accent gradient (blue -> purple) -->
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#69B6FF"/>
      <stop offset="60%" stop-color="#8E8BFF"/>
      <stop offset="100%" stop-color="#B69CFF"/>
    </linearGradient>

    <!-- Trophy gold -->
    <linearGradient id="gold" x1="0" y1="0" x2="0.8" y2="1">
      <stop offset="0%" stop-color="#FFD873"/>
      <stop offset="55%" stop-color="#F4B63A"/>
      <stop offset="100%" stop-color="#D8921E"/>
    </linearGradient>

    <!-- Soft shadow -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#2B4D8F" flood-opacity="0.12"/>
    </filter>

    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="0" stdDeviation="6" flood-color="#7FB5FF" flood-opacity="0.28"/>
    </filter>
  </defs>

  <!-- Background rounded pill -->
  <rect x="0" y="0" width="800" height="160" rx="28" fill="url(#bg)" filter="url(#shadow)"/>

  <!-- Right side decorative area -->
  <g transform="translate(430,14)">
    <!-- Subtle wave -->
    <path d="M-10,104 C40,78 92,82 142,58 C196,32 258,40 320,22"
          fill="none" stroke="url(#accent)" stroke-width="10" opacity="0.16" stroke-linecap="round"/>
    <path d="M-6,112 C46,86 98,90 146,66 C200,42 260,50 320,34"
          fill="none" stroke="url(#accent)" stroke-width="6" opacity="0.10" stroke-linecap="round"/>

    <!-- Bars -->
    <g opacity="0.92">
      <rect x="44"  y="82" width="46" height="50" rx="10" fill="url(#accent)" opacity="0.38"/>
      <rect x="104" y="62" width="46" height="70" rx="10" fill="url(#accent)" opacity="0.45"/>
      <rect x="164" y="44" width="46" height="88" rx="10" fill="url(#accent)" opacity="0.52"/>
      <rect x="224" y="66" width="46" height="66" rx="10" fill="url(#accent)" opacity="0.46"/>
      <rect x="284" y="30" width="46" height="102" rx="10" fill="url(#accent)" opacity="0.56"/>
    </g>

    <!-- Trend line -->
    <g fill="none" stroke="url(#accent)" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)" opacity="0.9">
      <path d="M66,86 L126,66 L186,52 L246,72 L306,44"/>
      <circle cx="66"  cy="86" r="8" fill="#7FB5FF"/>
      <circle cx="126" cy="66" r="8" fill="#88A6FF"/>
      <circle cx="186" cy="52" r="8" fill="#9A95FF"/>
      <circle cx="246" cy="72" r="8" fill="#A08FFF"/>
      <circle cx="306" cy="44" r="8" fill="#B49BFF"/>
    </g>

    <!-- Trophy -->
    <g transform="translate(278,-2) scale(1.35)">
      <path d="M58,30
               c0,18 -10,30 -26,34
               c-16,-4 -26,-16 -26,-34
               v-6 h52 z"
            fill="url(#gold)"/>
      <path d="M32,64 v14 h18 v10 h-44 v-10 h18 v-14"
            fill="url(#gold)" opacity="0.98"/>
      <path d="M6,20 h12 c0,18 -6,26 -14,30 c-2,1 -4,-1 -3,-3 c6,-6 5,-14 5,-27z"
            fill="url(#gold)" opacity="0.95"/>
      <path d="M66,20 h12 c0,13 1,21 5,27 c1,2 -1,4 -3,3 c-8,-4 -14,-12 -14,-30z"
            fill="url(#gold)" opacity="0.95"/>

      <!-- Star on trophy -->
      <path d="M32,32 l3,6 7,1 -5,5 1,7 -6,-3 -6,3 1,-7 -5,-5 7,-1z"
            fill="#FFF3C9" opacity="0.95"/>
    </g>

    <!-- Sparkles -->
    <g opacity="0.55">
      <path d="M304,20 l3,6 6,3 -6,3 -3,6 -3,-6 -6,-3 6,-3z" fill="#9CCBFF"/>
      <path d="M268,14 l2,4 4,2 -4,2 -2,4 -2,-4 -4,-2 4,-2z" fill="#B6A7FF"/>
      <circle cx="250" cy="34" r="3" fill="#9CCBFF"/>
      <circle cx="290" cy="54" r="2.5" fill="#B6A7FF"/>
    </g>
  </g>

  <!-- Left fade to keep text readable -->
  <rect x="0" y="0" width="470" height="160" rx="28" fill="#FFFFFF" opacity="0.50"/>
</svg>
