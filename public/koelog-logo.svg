<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1220 320" role="img" aria-labelledby="title desc">
  <title id="title">Koelogs logo</title>
  <desc id="desc">Rounded KoeLogs wordmark with connected underline</desc>

  <defs>
    <linearGradient id="brandGrad" x1="0%" y1="50%" x2="100%" y2="50%">
      <stop offset="0%" stop-color="#7f52f5" />
      <stop offset="55%" stop-color="#5fa0df" />
      <stop offset="100%" stop-color="#58cfd4" />
    </linearGradient>
  </defs>

  <g transform="translate(18 16)">
    <!-- koe (black) -->
    <path d="M78 42 V150 M78 96 L198 42 M78 96 L198 150" fill="none" stroke="#02050a" stroke-width="30" stroke-linecap="round" stroke-linejoin="round"/>
    <rect x="248" y="54" width="138" height="82" rx="32" fill="none" stroke="#02050a" stroke-width="30"/>
    <path d="M538 54 H458 Q426 54 426 95 Q426 136 458 136 H538 M462 95 H524" fill="none" stroke="#02050a" stroke-width="30" stroke-linecap="round" stroke-linejoin="round"/>

    <!-- separator -->
    <path d="M610 42 V150" fill="none" stroke="url(#brandGrad)" stroke-width="30" stroke-linecap="round"/>

    <!-- logs -->
    <path d="M690 42 V150" fill="none" stroke="url(#brandGrad)" stroke-width="30" stroke-linecap="round"/>
    <rect x="734" y="54" width="140" height="82" rx="32" fill="none" stroke="url(#brandGrad)" stroke-width="30"/>
    <path d="M1022 54 H942 Q910 54 910 95 Q910 136 942 136 H1008 Q1022 136 1022 150 Q1022 166 1008 166 H930" fill="none" stroke="url(#brandGrad)" stroke-width="30" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M1088 68 H1168 M1088 126 H1148" fill="none" stroke="url(#brandGrad)" stroke-width="30" stroke-linecap="round"/>

    <!-- connected underline -->
    <path d="M20 170 V212 Q20 236 44 236 H770 Q790 236 790 256 Q790 274 808 274 H1008 Q1030 274 1030 252 V176 Q1030 154 1052 154 H1094"
      fill="none" stroke="url(#brandGrad)" stroke-width="26" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
</svg>
